name: Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    tags:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: nigeleke/github/.github/actions/cargo-verify-version-vs-tag@main
            - shell: bash
              run: |
                  echo "checkout"
                  git status

    bundle:
        needs: [tags]
        uses: nigeleke/github/.github/workflows/dioxus-bundle.yml@main
        with:
            platform: web

    publish-site:
        needs: [bundle]
        uses: nigeleke/github/.github/workflows/rust-publish.yml@main
        secrets: inherit
